<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PriorityBoard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#09090b;--surface:#131318;--surface-hover:#1a1a22;--surface-raised:#1e1e28;
--border:#25252f;--border-light:#35354a;
--text:#ececf1;--text-muted:#8e8ea0;--text-dim:#5a5a6e;
--work:#e94560;--work-bg:rgba(233,69,96,.08);--work-border:rgba(233,69,96,.25);
--personal:#6c63ff;--personal-bg:rgba(108,99,255,.08);--personal-border:rgba(108,99,255,.25);
--health:#16c79a;--health-bg:rgba(22,199,154,.08);--health-border:rgba(22,199,154,.25);
--learning:#f5a623;--learning-bg:rgba(245,166,35,.08);--learning-border:rgba(245,166,35,.25);
--radius:10px;--radius-sm:6px;
--font-display:'Instrument Serif',Georgia,serif;
--font-body:'DM Sans',system-ui,sans-serif;
}
html{font-size:15px;-webkit-font-smoothing:antialiased}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:0;left:0;right:0;height:340px;background:radial-gradient(ellipse 80% 60% at 50% -20%,rgba(108,99,255,.06),transparent);pointer-events:none;z-index:0}

::selection{background:rgba(108,99,255,.3);color:#fff}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:var(--border-light)}

.app{position:relative;z-index:1;max-width:1440px;margin:0 auto;padding:0 28px 60px}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:28px 0 32px;border-bottom:1px solid var(--border);margin-bottom:28px}
.logo{display:flex;align-items:baseline;gap:12px}
.logo h1{font-family:var(--font-display);font-size:1.9rem;font-weight:400;letter-spacing:-.02em;color:var(--text);line-height:1}
.logo span{font-size:.72rem;text-transform:uppercase;letter-spacing:.15em;color:var(--text-dim);font-weight:500}
.header-actions{display:flex;gap:10px;align-items:center}

.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 18px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text-muted);font-family:var(--font-body);font-size:.82rem;font-weight:500;cursor:pointer;transition:all .2s ease}
.btn:hover{background:var(--surface-hover);color:var(--text);border-color:var(--border-light)}
.btn-primary{background:rgba(108,99,255,.12);border-color:rgba(108,99,255,.3);color:#a5a0ff}
.btn-primary:hover{background:rgba(108,99,255,.2);border-color:rgba(108,99,255,.5);color:#c4c0ff}
.btn svg{width:15px;height:15px}

/* BOARD */
.board{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;min-height:calc(100vh - 180px)}
@media(max-width:1100px){.board{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.board{grid-template-columns:1fr}}

/* COLUMN */
.column{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;min-height:300px;overflow:hidden;transition:border-color .3s ease}
.column:hover{border-color:var(--border-light)}
.column-header{padding:18px 18px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.column-title{display:flex;align-items:center;gap:10px}
.column-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.column-title h2{font-size:.82rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em}
.column-count{font-size:.72rem;color:var(--text-dim);background:var(--surface-raised);padding:2px 8px;border-radius:99px;font-weight:500}
.column[data-category="work"] .column-dot{background:var(--work);box-shadow:0 0 8px var(--work)}
.column[data-category="personal"] .column-dot{background:var(--personal);box-shadow:0 0 8px var(--personal)}
.column[data-category="health"] .column-dot{background:var(--health);box-shadow:0 0 8px var(--health)}
.column[data-category="learning"] .column-dot{background:var(--learning);box-shadow:0 0 8px var(--learning)}

.column-body{padding:10px;flex:1;display:flex;flex-direction:column;gap:6px;overflow-y:auto}
.column-footer{padding:8px 10px 10px;border-top:1px solid var(--border)}

.add-btn{width:100%;padding:10px;border-radius:var(--radius-sm);border:1px dashed var(--border);background:transparent;color:var(--text-dim);font-family:var(--font-body);font-size:.8rem;cursor:pointer;transition:all .2s ease;display:flex;align-items:center;justify-content:center;gap:6px}
.add-btn:hover{border-color:var(--border-light);color:var(--text-muted);background:var(--surface-hover)}
.add-btn svg{width:14px;height:14px}

/* CARD */
.card{background:var(--surface-raised);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;cursor:grab;transition:all .2s ease;position:relative}
.card:hover{border-color:var(--border-light);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.card:active{cursor:grabbing}
.card.completed{opacity:.45}
.card.completed .card-title{text-decoration:line-through;color:var(--text-dim)}

.card-top{display:flex;align-items:flex-start;gap:10px}
.card-check{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border-light);background:transparent;cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s ease;appearance:none;-webkit-appearance:none}
.card-check:hover{border-color:var(--text-muted);background:var(--surface)}
.card-check.checked{background:var(--health);border-color:var(--health)}
.card-check.checked::after{content:'';display:block;width:5px;height:8px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg) translateY(-1px)}

.card-content{flex:1;min-width:0}
.card-title{font-size:.88rem;font-weight:500;color:var(--text);line-height:1.4;word-break:break-word}
.card-meta{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap}
.card-due{font-size:.7rem;color:var(--text-dim);display:flex;align-items:center;gap:4px}
.card-due.overdue{color:var(--work);font-weight:600}
.card-due svg{width:11px;height:11px}

.card-actions{display:flex;gap:2px;opacity:0;transition:opacity .15s ease}
.card:hover .card-actions{opacity:1}
.card-action-btn{width:26px;height:26px;border-radius:4px;border:none;background:transparent;color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s ease}
.card-action-btn:hover{background:var(--surface);color:var(--text-muted)}
.card-action-btn.delete:hover{color:var(--work);background:var(--work-bg)}
.card-action-btn svg{width:13px;height:13px}

.card-notes{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:.78rem;color:var(--text-muted);line-height:1.5;display:none}
.card-notes.visible{display:block}
.card-notes textarea{width:100%;background:transparent;border:none;color:var(--text-muted);font-family:var(--font-body);font-size:.78rem;line-height:1.5;resize:vertical;min-height:40px;outline:none}
.card-notes textarea::placeholder{color:var(--text-dim)}

/* Inline add form */
.add-form{padding:10px;background:var(--surface-raised);border:1px solid var(--border-light);border-radius:var(--radius-sm);display:none}
.add-form.visible{display:block}
.add-form input,.add-form textarea{width:100%;background:transparent;border:1px solid var(--border);border-radius:4px;padding:8px 10px;color:var(--text);font-family:var(--font-body);font-size:.82rem;outline:none;transition:border-color .15s}
.add-form input:focus,.add-form textarea:focus{border-color:var(--personal)}
.add-form input::placeholder,.add-form textarea::placeholder{color:var(--text-dim)}
.add-form input{margin-bottom:6px}
.add-form textarea{min-height:36px;resize:vertical;margin-bottom:6px}
.add-form-row{display:flex;gap:6px;align-items:center}
.add-form-row input[type="date"]{flex:1;color-scheme:dark}
.add-form-actions{display:flex;gap:6px;margin-top:8px}
.add-form-actions .btn{padding:6px 14px;font-size:.78rem}

/* Sortable ghost */
.sortable-ghost{opacity:.3;border:1px dashed var(--personal)!important;background:var(--personal-bg)!important}
.sortable-chosen{box-shadow:0 8px 30px rgba(0,0,0,.4)!important;transform:scale(1.02)!important}

/* DASHBOARD OVERLAY */
.dashboard-overlay{position:fixed;top:0;right:0;bottom:0;width:420px;background:var(--surface);border-left:1px solid var(--border);z-index:100;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:-20px 0 60px rgba(0,0,0,.5)}
.dashboard-overlay.open{transform:translateX(0)}
.dashboard-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99;opacity:0;pointer-events:none;transition:opacity .3s}
.dashboard-backdrop.open{opacity:1;pointer-events:auto}
@media(max-width:640px){.dashboard-overlay{width:100%}}

.dash-header{padding:24px 24px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.dash-header h2{font-family:var(--font-display);font-size:1.5rem;font-weight:400}
.dash-close{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.dash-close:hover{background:var(--surface-hover);color:var(--text)}
.dash-close svg{width:16px;height:16px}

.dash-body{padding:24px;overflow-y:auto;flex:1}
.dash-section{margin-bottom:28px}
.dash-section h3{font-size:.72rem;text-transform:uppercase;letter-spacing:.12em;color:var(--text-dim);margin-bottom:14px;font-weight:600}

.dash-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat-card{background:var(--surface-raised);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px}
.stat-value{font-size:1.8rem;font-weight:700;font-family:var(--font-display);line-height:1}
.stat-label{font-size:.72rem;color:var(--text-dim);margin-top:4px;text-transform:uppercase;letter-spacing:.08em}
.stat-card.accent .stat-value{color:var(--personal)}

.dash-category{margin-bottom:14px}
.dash-cat-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.dash-cat-name{font-size:.82rem;font-weight:500;display:flex;align-items:center;gap:8px}
.dash-cat-pct{font-size:.78rem;color:var(--text-dim);font-weight:500}
.dash-bar{height:6px;background:var(--border);border-radius:99px;overflow:hidden}
.dash-bar-fill{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}

.dash-overdue-list{display:flex;flex-direction:column;gap:6px}
.dash-overdue-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--work-bg);border:1px solid var(--work-border);border-radius:var(--radius-sm)}
.dash-overdue-dot{width:6px;height:6px;border-radius:50%;background:var(--work);flex-shrink:0}
.dash-overdue-text{font-size:.82rem;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dash-overdue-due{font-size:.7rem;color:var(--work);white-space:nowrap}

.dash-empty{font-size:.82rem;color:var(--text-dim);text-align:center;padding:20px}

/* STREAK */
.streak-card{background:linear-gradient(135deg,rgba(108,99,255,.1),rgba(22,199,154,.08));border:1px solid rgba(108,99,255,.2);border-radius:var(--radius-sm);padding:20px;text-align:center}
.streak-value{font-size:2.4rem;font-weight:700;font-family:var(--font-display);background:linear-gradient(135deg,var(--personal),var(--health));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.streak-label{font-size:.72rem;color:var(--text-dim);margin-top:2px;text-transform:uppercase;letter-spacing:.1em}

/* EDIT MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:480px;max-width:90vw;max-height:85vh;overflow-y:auto;padding:28px}
.modal h2{font-family:var(--font-display);font-size:1.4rem;margin-bottom:20px;font-weight:400}
.modal-field{margin-bottom:16px}
.modal-field label{display:block;font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-dim);margin-bottom:6px;font-weight:600}
.modal-field input,.modal-field textarea,.modal-field select{width:100%;background:var(--surface-raised);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);font-family:var(--font-body);font-size:.88rem;outline:none;transition:border-color .15s}
.modal-field input:focus,.modal-field textarea:focus,.modal-field select:focus{border-color:var(--personal)}
.modal-field textarea{min-height:80px;resize:vertical}
.modal-field select{color-scheme:dark;cursor:pointer}
.modal-field select option{background:var(--surface)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:24px}
.modal-actions .btn{padding:10px 22px}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeUp .25s ease backwards}
.column:nth-child(1) .card{animation-delay:calc(var(--i,0) * 30ms)}
.column:nth-child(2) .card{animation-delay:calc(var(--i,0) * 30ms + 50ms)}
.column:nth-child(3) .card{animation-delay:calc(var(--i,0) * 30ms + 100ms)}
.column:nth-child(4) .card{animation-delay:calc(var(--i,0) * 30ms + 150ms)}

/* Global add modal */
.global-add-btn svg{width:15px;height:15px}
</style>
</head>
<body>

<div class="app">
  <header class="header">
    <div class="logo">
      <h1>PriorityBoard</h1>
      <span>Stay focused</span>
    </div>
    <div class="header-actions">
      <button class="btn" id="dashboardBtn" title="Dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </button>
      <button class="btn btn-primary global-add-btn" id="globalAddBtn" title="Add Priority">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Priority
      </button>
    </div>
  </header>

  <div class="board" id="board">
    <div class="column" data-category="work">
      <div class="column-header">
        <div class="column-title"><div class="column-dot"></div><h2>Work</h2></div>
        <span class="column-count" id="count-work">0</span>
      </div>
      <div class="column-body" id="col-work"></div>
      <div class="column-footer">
        <button class="add-btn" onclick="toggleAddForm('work')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add item
        </button>
        <div class="add-form" id="add-form-work">
          <input type="text" placeholder="What needs to be done?" id="add-title-work" onkeydown="if(event.key==='Enter')addItem('work')">
          <div class="add-form-row">
            <input type="date" id="add-date-work">
          </div>
          <div class="add-form-actions">
            <button class="btn btn-primary" onclick="addItem('work')">Add</button>
            <button class="btn" onclick="toggleAddForm('work')">Cancel</button>
          </div>
        </div>
      </div>
    </div>

    <div class="column" data-category="personal">
      <div class="column-header">
        <div class="column-title"><div class="column-dot"></div><h2>Personal</h2></div>
        <span class="column-count" id="count-personal">0</span>
      </div>
      <div class="column-body" id="col-personal"></div>
      <div class="column-footer">
        <button class="add-btn" onclick="toggleAddForm('personal')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add item
        </button>
        <div class="add-form" id="add-form-personal">
          <input type="text" placeholder="What needs to be done?" id="add-title-personal" onkeydown="if(event.key==='Enter')addItem('personal')">
          <div class="add-form-row">
            <input type="date" id="add-date-personal">
          </div>
          <div class="add-form-actions">
            <button class="btn btn-primary" onclick="addItem('personal')">Add</button>
            <button class="btn" onclick="toggleAddForm('personal')">Cancel</button>
          </div>
        </div>
      </div>
    </div>

    <div class="column" data-category="health">
      <div class="column-header">
        <div class="column-title"><div class="column-dot"></div><h2>Health</h2></div>
        <span class="column-count" id="count-health">0</span>
      </div>
      <div class="column-body" id="col-health"></div>
      <div class="column-footer">
        <button class="add-btn" onclick="toggleAddForm('health')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add item
        </button>
        <div class="add-form" id="add-form-health">
          <input type="text" placeholder="What needs to be done?" id="add-title-health" onkeydown="if(event.key==='Enter')addItem('health')">
          <div class="add-form-row">
            <input type="date" id="add-date-health">
          </div>
          <div class="add-form-actions">
            <button class="btn btn-primary" onclick="addItem('health')">Add</button>
            <button class="btn" onclick="toggleAddForm('health')">Cancel</button>
          </div>
        </div>
      </div>
    </div>

    <div class="column" data-category="learning">
      <div class="column-header">
        <div class="column-title"><div class="column-dot"></div><h2>Learning</h2></div>
        <span class="column-count" id="count-learning">0</span>
      </div>
      <div class="column-body" id="col-learning"></div>
      <div class="column-footer">
        <button class="add-btn" onclick="toggleAddForm('learning')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add item
        </button>
        <div class="add-form" id="add-form-learning">
          <input type="text" placeholder="What needs to be done?" id="add-title-learning" onkeydown="if(event.key==='Enter')addItem('learning')">
          <div class="add-form-row">
            <input type="date" id="add-date-learning">
          </div>
          <div class="add-form-actions">
            <button class="btn btn-primary" onclick="addItem('learning')">Add</button>
            <button class="btn" onclick="toggleAddForm('learning')">Cancel</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard-backdrop" id="dashBackdrop"></div>
<div class="dashboard-overlay" id="dashPanel">
  <div class="dash-header">
    <h2>Dashboard</h2>
    <button class="dash-close" id="dashClose">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="dash-body" id="dashBody"></div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h2>Edit Priority</h2>
    <div class="modal-field">
      <label>Title</label>
      <input type="text" id="edit-title">
    </div>
    <div class="modal-field">
      <label>Notes</label>
      <textarea id="edit-notes" placeholder="Add notes..."></textarea>
    </div>
    <div class="modal-field">
      <label>Due Date</label>
      <input type="date" id="edit-date">
    </div>
    <div class="modal-field">
      <label>Category</label>
      <select id="edit-category">
        <option value="work">Work</option>
        <option value="personal">Personal</option>
        <option value="health">Health</option>
        <option value="learning">Learning</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeEditModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<script>
const CATEGORIES = ['work','personal','health','learning'];
const CAT_LABELS = {work:'Work',personal:'Personal',health:'Health',learning:'Learning'};
const CAT_COLORS = {
  work:{color:'var(--work)',bg:'var(--work-bg)'},
  personal:{color:'var(--personal)',bg:'var(--personal-bg)'},
  health:{color:'var(--health)',bg:'var(--health-bg)'},
  learning:{color:'var(--learning)',bg:'var(--learning-bg)'}
};
let items = JSON.parse(localStorage.getItem('priorityboard_items') || '[]');
let streakData = JSON.parse(localStorage.getItem('priorityboard_streak') || '{"dates":[]}');
let editingId = null;

function genId(){return crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36)+Math.random().toString(36).slice(2)}

function save(){
  localStorage.setItem('priorityboard_items',JSON.stringify(items));
  localStorage.setItem('priorityboard_streak',JSON.stringify(streakData));
}

function getItems(cat){return items.filter(i=>i.category===cat).sort((a,b)=>a.order-b.order)}
function today(){return new Date().toISOString().split('T')[0]}

function isOverdue(item){
  if(!item.dueDate || item.completed) return false;
  return item.dueDate < today();
}

function formatDate(d){
  if(!d) return '';
  const parts = d.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[parseInt(parts[1])-1]+' '+parseInt(parts[2]);
}

function createCard(item, idx){
  const overdue = isOverdue(item);
  const div = document.createElement('div');
  div.className = 'card' + (item.completed ? ' completed' : '');
  div.dataset.id = item.id;
  div.style.setProperty('--i', idx);
  div.style.borderLeft = `3px solid ${CAT_COLORS[item.category].color}`;

  div.innerHTML = `
    <div class="card-top">
      <button class="card-check ${item.completed?'checked':''}" onclick="toggleComplete('${item.id}')"></button>
      <div class="card-content">
        <div class="card-title">${escHtml(item.title)}</div>
        <div class="card-meta">
          ${item.dueDate ? `<span class="card-due ${overdue?'overdue':''}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
            ${formatDate(item.dueDate)}${overdue?' — Overdue':''}
          </span>` : ''}
        </div>
      </div>
      <div class="card-actions">
        ${item.notes ? `<button class="card-action-btn" onclick="toggleNotes('${item.id}')" title="Toggle notes"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg></button>` : ''}
        <button class="card-action-btn" onclick="openEditModal('${item.id}')" title="Edit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
        <button class="card-action-btn delete" onclick="deleteItem('${item.id}')" title="Delete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
      </div>
    </div>
    ${item.notes ? `<div class="card-notes" id="notes-${item.id}">${escHtml(item.notes)}</div>` : ''}
  `;
  return div;
}

function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function renderColumn(cat){
  const col = document.getElementById('col-'+cat);
  const catItems = getItems(cat);
  col.innerHTML = '';
  catItems.forEach((item, i) => col.appendChild(createCard(item, i)));
  document.getElementById('count-'+cat).textContent = catItems.filter(i=>!i.completed).length;
}

function render(){
  CATEGORIES.forEach(renderColumn);
  updateSortable();
}

function updateSortable(){
  CATEGORIES.forEach(cat => {
    const el = document.getElementById('col-'+cat);
    if(el._sortable) return;
    el._sortable = new Sortable(el, {
      group:'priorities',
      animation:200,
      ghostClass:'sortable-ghost',
      chosenClass:'sortable-chosen',
      delay:50,
      delayOnTouchOnly:true,
      onEnd(evt){
        const id = evt.item.dataset.id;
        const item = items.find(i=>i.id===id);
        if(!item) return;
        const newCat = evt.to.id.replace('col-','');
        item.category = newCat;
        const siblings = [...evt.to.children];
        siblings.forEach((el, idx) => {
          const sib = items.find(i=>i.id===el.dataset.id);
          if(sib) sib.order = idx;
        });
        save();
        CATEGORIES.forEach(renderColumn);
      }
    });
  });
}

function addItem(cat){
  const titleInput = document.getElementById('add-title-'+cat);
  const dateInput = document.getElementById('add-date-'+cat);
  const title = titleInput.value.trim();
  if(!title) { titleInput.focus(); return; }
  const catItems = getItems(cat);
  items.push({
    id: genId(),
    title,
    notes: '',
    category: cat,
    dueDate: dateInput.value || null,
    completed: false,
    completedAt: null,
    order: catItems.length,
    createdAt: new Date().toISOString()
  });
  save();
  titleInput.value = '';
  dateInput.value = '';
  toggleAddForm(cat);
  renderColumn(cat);
}

function toggleAddForm(cat){
  const form = document.getElementById('add-form-'+cat);
  form.classList.toggle('visible');
  if(form.classList.contains('visible')){
    document.getElementById('add-title-'+cat).focus();
  }
}

function toggleComplete(id){
  const item = items.find(i=>i.id===id);
  if(!item) return;
  item.completed = !item.completed;
  item.completedAt = item.completed ? new Date().toISOString() : null;
  if(item.completed){
    const d = today();
    if(!streakData.dates.includes(d)){
      streakData.dates.push(d);
      if(streakData.dates.length > 365) streakData.dates = streakData.dates.slice(-365);
    }
  }
  save();
  render();
}

function toggleNotes(id){
  const el = document.getElementById('notes-'+id);
  if(el) el.classList.toggle('visible');
}

function deleteItem(id){
  if(!confirm('Delete this priority?')) return;
  items = items.filter(i=>i.id!==id);
  save();
  render();
}

function openEditModal(id){
  const item = items.find(i=>i.id===id);
  if(!item) return;
  editingId = id;
  document.getElementById('edit-title').value = item.title;
  document.getElementById('edit-notes').value = item.notes || '';
  document.getElementById('edit-date').value = item.dueDate || '';
  document.getElementById('edit-category').value = item.category;
  document.getElementById('editModal').classList.add('open');
}

function closeEditModal(){
  document.getElementById('editModal').classList.remove('open');
  editingId = null;
}

function saveEdit(){
  const item = items.find(i=>i.id===editingId);
  if(!item) return;
  const title = document.getElementById('edit-title').value.trim();
  if(!title) return;
  const oldCat = item.category;
  item.title = title;
  item.notes = document.getElementById('edit-notes').value.trim();
  item.dueDate = document.getElementById('edit-date').value || null;
  const newCat = document.getElementById('edit-category').value;
  if(newCat !== oldCat){
    item.category = newCat;
    item.order = getItems(newCat).length;
  }
  save();
  closeEditModal();
  render();
}

document.getElementById('editModal').addEventListener('click', function(e){
  if(e.target === this) closeEditModal();
});

// DASHBOARD
function openDashboard(){document.getElementById('dashPanel').classList.add('open');document.getElementById('dashBackdrop').classList.add('open');renderDashboard()}
function closeDashboard(){document.getElementById('dashPanel').classList.remove('open');document.getElementById('dashBackdrop').classList.remove('open')}
document.getElementById('dashboardBtn').addEventListener('click', openDashboard);
document.getElementById('dashClose').addEventListener('click', closeDashboard);
document.getElementById('dashBackdrop').addEventListener('click', closeDashboard);

function getStreak(){
  const dates = streakData.dates.sort().reverse();
  if(!dates.length) return 0;
  let streak = 0;
  let check = new Date();
  check.setHours(0,0,0,0);
  for(let i=0;i<365;i++){
    const ds = check.toISOString().split('T')[0];
    if(dates.includes(ds)){
      streak++;
    } else if(i > 0){
      break;
    }
    check.setDate(check.getDate()-1);
  }
  return streak;
}

function renderDashboard(){
  const total = items.length;
  const completed = items.filter(i=>i.completed).length;
  const active = total - completed;
  const overdue = items.filter(i=>isOverdue(i));
  const pct = total ? Math.round((completed/total)*100) : 0;

  let html = `
    <div class="dash-section">
      <h3>Overview</h3>
      <div class="dash-stats">
        <div class="stat-card"><div class="stat-value">${active}</div><div class="stat-label">Active</div></div>
        <div class="stat-card"><div class="stat-value">${completed}</div><div class="stat-label">Completed</div></div>
        <div class="stat-card accent"><div class="stat-value">${pct}%</div><div class="stat-label">Done</div></div>
        <div class="stat-card"><div class="stat-value">${overdue.length}</div><div class="stat-label">Overdue</div></div>
      </div>
    </div>
    <div class="dash-section">
      <h3>By Category</h3>`;

  CATEGORIES.forEach(cat => {
    const catItems = items.filter(i=>i.category===cat);
    const catDone = catItems.filter(i=>i.completed).length;
    const catPct = catItems.length ? Math.round((catDone/catItems.length)*100) : 0;
    html += `
      <div class="dash-category">
        <div class="dash-cat-header">
          <span class="dash-cat-name"><span style="color:${CAT_COLORS[cat].color}">●</span> ${CAT_LABELS[cat]}</span>
          <span class="dash-cat-pct">${catDone}/${catItems.length}</span>
        </div>
        <div class="dash-bar"><div class="dash-bar-fill" style="width:${catPct}%;background:${CAT_COLORS[cat].color}"></div></div>
      </div>`;
  });

  html += `</div>`;

  // Streak
  const streak = getStreak();
  html += `
    <div class="dash-section">
      <h3>Completion Streak</h3>
      <div class="streak-card">
        <div class="streak-value">${streak}</div>
        <div class="streak-label">${streak===1?'day':'days'} in a row</div>
      </div>
    </div>`;

  // Overdue
  if(overdue.length){
    html += `<div class="dash-section"><h3>Overdue</h3><div class="dash-overdue-list">`;
    overdue.forEach(item => {
      html += `
        <div class="dash-overdue-item">
          <div class="dash-overdue-dot"></div>
          <span class="dash-overdue-text">${escHtml(item.title)}</span>
          <span class="dash-overdue-due">${formatDate(item.dueDate)}</span>
        </div>`;
    });
    html += `</div></div>`;
  }

  if(total === 0){
    html = `<div class="dash-empty">No priorities yet.<br>Add your first item to see stats here.</div>`;
  }

  document.getElementById('dashBody').innerHTML = html;
}

// Global Add
document.getElementById('globalAddBtn').addEventListener('click', function(){
  editingId = null;
  document.getElementById('edit-title').value = '';
  document.getElementById('edit-notes').value = '';
  document.getElementById('edit-date').value = '';
  document.getElementById('edit-category').value = 'work';
  document.querySelector('#editModal .modal h2').textContent = 'Add Priority';
  document.querySelector('#editModal .modal-actions .btn-primary').textContent = 'Add';
  document.getElementById('editModal').classList.add('open');
  document.getElementById('edit-title').focus();

  const origSave = saveEdit;
  const modal = document.getElementById('editModal');
  modal._addMode = true;
});

const _origSaveEdit = saveEdit;
saveEdit = function(){
  const modal = document.getElementById('editModal');
  if(modal._addMode){
    const title = document.getElementById('edit-title').value.trim();
    if(!title) return;
    const cat = document.getElementById('edit-category').value;
    items.push({
      id: genId(),
      title,
      notes: document.getElementById('edit-notes').value.trim(),
      category: cat,
      dueDate: document.getElementById('edit-date').value || null,
      completed: false,
      completedAt: null,
      order: getItems(cat).length,
      createdAt: new Date().toISOString()
    });
    save();
    closeEditModal();
    modal._addMode = false;
    render();
    return;
  }
  _origSaveEdit();
};

// Keyboard
document.addEventListener('keydown', function(e){
  if(e.key === 'Escape'){
    closeDashboard();
    closeEditModal();
  }
});

// Init
render();
</script>
</body>
</html>
